
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - GroceryPOS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
        }

        .login-card {
            border-radius: 1rem;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,.4);
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: #198754;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-start">
            <div class="col-sm-9 col-md-7 col-lg-5 col-xl-4 ms-lg-7">
                <div class="card login-card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="brand-icon mb-3">
                                <i class="fas fa-shopping-cart fs-3 text-white"></i>
                            </div>
                            <h4 class="fw-bold"> Rhyzen GroceryPOS</h4>
                            <p class="text-muted small">MiniMart Point of Sale System</p>
                        </div>

                        <form id="loginForm">
                            <div asp-validation-summary="All" class="alert alert-danger small py-2 d-none"></div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user text-whhite"></i></span>
                                    <input id="username"
                                           type="text"
                                           class="form-control"
                                           placeholder="Enter username" />
                                </div>
                                <span asp-validation-for="UserName" class="text-danger small"></span>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold small">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-lock text-white"></i>
                                    </span>
                                    <input id="password"
                                           type="password"
                                           class="form-control"
                                           placeholder="Enter password" />
                                </div>
                                <span asp-validation-for="Password" class="text-danger small"></span>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input asp-for="RememberMe" class="form-check-input" />
                                    <label class="form-check-label small">Remember me</label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-login w-100">
                                <i class="fas fa-sign-in-alt me-2"></i>
                                Sign In
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <small class="text-white">Default: admin / Admin@123</small>
                        </div>


                    </div>
                </div>
                <div class="footer-brand">
                    FORGED BY DIGITAL RONIN
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <div class="glow-circle glow1"></div>
    <div class="glow-circle glow2"></div>
    <script src="login.js"></script>

</body>
</html>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient( rgba(0,0,0,.10), rgba(0,0,0,.10) ),url("assets/login-bg.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
        position: relative;
    }


        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient( 90deg, rgba(0,0,0,.20), rgba(0,0,0,.05) );
            pointer-events: none;
        }

        body::after {
            content: "";
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 200px rgba(255,0,0,.15);
            pointer-events: none;
        }

    /* Animated Background */


    @@keyframes moveGrid {
        from {
            transform: translateX(0);
        }

        to {
            transform: translateX(-120px);
        }
    }

    .login-card {
        width: 420px;
        position: absolute;
        left: 120px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(10,10,10,.72);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255,0,0,.25);
        border-radius: 24px;
    }

        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient( 90deg, transparent, #ff2e2e, transparent );
        }

    .brand-icon {
        width: 85px;
        height: 85px;
        margin: auto;
        border-radius: 20px;
        background: linear-gradient( 135deg, #ff2e2e, #a40000 );
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 25px rgba(255,0,0,.4);
    }

        .brand-icon i {
            font-size: 32px;
            color: white;
        }

    h4 {
        color: white;
        font-weight: 700;
        letter-spacing: .5px;
    }

    p.text-muted,
    .form-check-label,
    small {
        color: #9f9f9f !important;
    }

    .form-label {
        color: #e4e4e4;
        font-weight: 600;
    }

    .input-group-text {
        background: #1c1c1c;
        border: 1px solid #2f2f2f;
        color: #ff4d4d;
    }

    .form-control {
        background: #131313;
        border: 1px solid #2f2f2f;
        color: white;
        height: 52px;
    }

        .form-control:focus {
            background: #131313;
            color: white;
            border-color: #ff2e2e;
            box-shadow: 0 0 0 3px rgba(255,0,0,.15), 0 0 15px rgba(255,0,0,.25);
        }

        .form-control::placeholder {
            color: #777;
        }

    .form-check-input {
        background-color: #131313;
        border-color: #555;
    }

        .form-check-input:checked {
            background-color: #ff2e2e;
            border-color: #ff2e2e;
        }

    .btn-login {
        height: 55px;
        border: none;
        border-radius: 12px;
        background: linear-gradient( 135deg, #ff2e2e, #b00000 );
        color: white;
        font-size: 18px;
        font-weight: 600;
        transition: .3s;
    }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255,0,0,.35);
        }

    .footer-text {
        color: #777;
    }

    .glow-circle {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: rgba(255,0,0,.08);
        filter: blur(100px);
        z-index: -1;
    }

    .glow1 {
        top: -100px;
        left: -100px;
    }

    .glow2 {
        bottom: -100px;
        right: -100px;
    }

    .text-muted {
        color: white
    }


    .footer-brand {
        position: fixed;
        bottom: 25px;
        left: 60%;
        transform: translateX(-50%);
        color: #ff4040;
        letter-spacing: 14px;
        font-size: 20px;
        font-weight: 500;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(255,0,0,.5);
        z-index: 100;
    }

    .input-group-text i {
        color: #fff !important;
    }

    .form-control::placeholder {
        color: #ffffff !important;
        opacity: 0.8;
    }
</style>
